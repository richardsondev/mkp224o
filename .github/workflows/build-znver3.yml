name: Build znver3

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake pkg-config libsodium-dev
      - name: Build
        run: |
          ./autogen.sh
          ./configure CFLAGS="-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer -pipe"
          make -j$(nproc)
          strip mkp224o
          mv mkp224o mkp224o-znver3
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: mkp224o-znver3-linux
          path: mkp224o-znver3

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-libsodium
      - name: Build
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure CFLAGS="-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer -pipe"
          make -j$(nproc)
          strip mkp224o.exe
          mv mkp224o.exe mkp224o-znver3.exe
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: mkp224o-znver3-windows
          path: mkp224o-znver3.exe
